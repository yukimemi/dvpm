name: deno

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: denoland/setup-deno@v2
      - run: deno publish

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1
        if: matrix.os == 'ubuntu-latest'
        id: vim-rhysd
        with:
          version: "v9.2.0148" # renovate: datasource=github-releases depName=vim/vim-win32-installer

      - uses: thinca/action-setup-vim@40587a4deeeaf61ef8086bd3badd42e734a67093 # v3
        if: matrix.os != 'ubuntu-latest'
        id: vim-thinca
        with:
          vim_type: "Vim"
          vim_version: "v9.2.0148" # renovate: datasource=github-releases depName=vim/vim-win32-installer

      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1
        id: nvim
        with:
          neovim: true
          version: "v0.12.4" # renovate: datasource=github-releases depName=neovim/neovim

      - uses: denoland/setup-deno@v2

      - run: deno task ci
        env:
          DENOPS_TEST_VIM_EXECUTABLE: ${{ steps.vim-rhysd.outputs.executable || steps.vim-thinca.outputs.executable }}
          DENOPS_TEST_NVIM_EXECUTABLE: ${{ steps.nvim.outputs.executable }}
